<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Latar navy -->
  <rect width="64" height="64" rx="10" fill="#1E2B8C"/>
  <!-- Oval/elips miring representasi dial jam -->
  <ellipse cx="32" cy="27" rx="15" ry="11"
           fill="none" stroke="#FFFFFF" stroke-width="2.5"
           transform="rotate(-15 32 27)"/>
  <!-- Jarum panjang (merah, arah 11) -->
  <line x1="32" y1="27" x2="22" y2="14"
        stroke="#E8231A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Jarum pendek (merah, arah 8) -->
  <line x1="32" y1="27" x2="21" y2="31"
        stroke="#E8231A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Titik tengah -->
  <circle cx="32" cy="27" r="2" fill="#FFFFFF"/>
</svg>
